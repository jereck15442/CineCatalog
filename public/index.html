<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>CineCatalog | Premium Movie Manager</title>
    <style>
      :root {
        --bg: #0f172a;
        --card-bg: #1e293b;
        --accent: #38bdf8;
        --text-main: #f8fafc;
        --text-dim: #94a3b8;
        --danger: #ef4444;
        --success: #22c55e;
      }

      body {
        font-family: 'Inter', system-ui, sans-serif;
        background: var(--bg);
        color: var(--text-main);
        margin: 0;
        padding: 20px;
        line-height: 1.6;
      }

      .container {
        max-width: 1000px;
        margin: auto;
      }

      h1 {
        text-align: center;
        font-size: 2.5rem;
        letter-spacing: -1px;
        background: linear-gradient(to right, #38bdf8, #818cf8);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
      }

      /* Form Styling */
      .form-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
        gap: 15px;
        background: var(--card-bg);
        padding: 25px;
        border-radius: 12px;
        border: 1px solid #334155;
        margin-bottom: 40px;
      }

      input {
        background: #0f172a;
        border: 1px solid #334155;
        padding: 12px;
        border-radius: 6px;
        color: white;
        outline: none;
        transition: border 0.3s;
      }

      input:focus {
        border-color: var(--accent);
      }

      button {
        padding: 12px 20px;
        font-weight: 600;
        border: none;
        border-radius: 6px;
        cursor: pointer;
        transition: transform 0.2s, opacity 0.2s;
      }

      button:active {
        transform: scale(0.98);
      }

      .btn-primary {
        background: var(--accent);
        color: var(--bg);
      }
      .btn-secondary {
        background: #334155;
        color: white;
        margin-right: 10px;
      }

      /* Catalog Grid */
      .controls {
        margin-bottom: 20px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .movie-grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(280px, 1fr));
        gap: 20px;
      }

      .movie-card {
        background: var(--card-bg);
        border-radius: 12px;
        padding: 20px;
        border: 1px solid #334155;
        position: relative;
        transition: translateY -5px;
        animation: fadeIn 0.5s ease;
      }

      .movie-card:hover {
        transform: translateY(-5px);
        border-color: var(--accent);
      }

      @keyframes fadeIn {
        from {
          opacity: 0;
          transform: translateY(10px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .movie-card h3 {
        margin: 0 0 10px 0;
        color: var(--accent);
      }
      .movie-meta {
        font-size: 0.9rem;
        color: var(--text-dim);
        margin-bottom: 15px;
      }
      .rating-badge {
        background: #0ea5e920;
        color: var(--accent);
        padding: 4px 8px;
        border-radius: 4px;
        font-weight: bold;
      }

      .delete-icon {
        position: absolute;
        top: 15px;
        right: 15px;
        color: var(--text-dim);
        cursor: pointer;
        font-size: 1.2rem;
      }

      .delete-icon:hover {
        color: var(--danger);
      }
    </style>
  </head>
  <body>
    <div class="container">
      <h1>🎬 CineCatalog</h1>

      <div class="form-grid">
        <input type="text" id="title" placeholder="Movie Title" />
        <input type="text" id="genre" placeholder="Genre (e.g. Action)" />
        <input type="number" id="year" placeholder="Year" />
        <input
          type="number"
          step="0.1"
          id="rating"
          placeholder="Rating (0.0)"
        />
        <button class="btn-primary" onclick="addMovie()">
          + Add to Library
        </button>
      </div>

      <div class="controls">
        <h2>Your Collection</h2>
        <div>
          <button class="btn-secondary" onclick="loadMovies()">View All</button>
          <button
            class="btn-secondary"
            onclick="loadTopRated()"
            style="border-left: 3px solid #fbbf24"
          >
            ⭐ Top Rated
          </button>
        </div>
      </div>

      <div id="movieGrid" class="movie-grid"></div>
    </div>

    <script>
      const API_URL =
        window.location.hostname === 'localhost'
          ? 'https://cinecatalog.onrender.com'
          : '/api';

      async function loadMovies() {
        const res = await fetch(`${API_URL}/movies`);
        const data = await res.json();
        displayMovies(data);
      }

      async function loadTopRated() {
        const res = await fetch(`https://cinecatalog.onrender.com/movies/featured/top`);
        const data = await res.json();
        displayMovies(data);
      }

      function displayMovies(movies) {
        const grid = document.getElementById('movieGrid');
        grid.innerHTML = '';

        movies.forEach((movie) => {
          const card = document.createElement('div');
          card.className = 'movie-card';
          card.innerHTML = `
                    <span class="delete-icon" onclick="deleteMovie(${movie.id})">×</span>
                    <h3>${movie.title}</h3>
                    <div class="movie-meta">
                        ${movie.genre} • ${movie.year}
                    </div>
                    <div class="rating-badge">⭐ ${movie.rating}</div>
                `;
          grid.appendChild(card);
        });
      }

      async function addMovie() {
        const title = document.getElementById('title').value;
        const genre = document.getElementById('genre').value;
        const year = document.getElementById('year').value;
        const rating = document.getElementById('rating').value;

        if (!title || !genre) return alert('Please fill in title and genre');

        const res = await fetch(`https://cinecatalog.onrender.com/movies`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ title, genre, year, rating }),
        });

        if (res.ok) {
          // Clear inputs
          document.querySelectorAll('input').forEach((i) => (i.value = ''));
          loadMovies();
        }
      }

      async function deleteMovie(id) {
        if (confirm('Remove this movie from your catalog?')) {
          await fetch(`https://cinecatalog.onrender.com/movies/${id}`, { method: 'DELETE' });
          loadMovies();
        }
      }

      loadMovies();
    </script>
  </body>
</html>
